name: Merge Release PR

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  merge-release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Merge clean release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          with_retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi
              echo "GitHub CLI command failed on attempt $attempt; retrying shortly."
              sleep $((attempt * 5))
            done
            "$@"
          }

          pr_number="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head dev \
            --state open \
            --json number \
            --jq '.[0].number // ""')"

          if [ -z "$pr_number" ]; then
            echo "No open dev to main release PR."
            exit 0
          fi

          echo "Checking release PR #$pr_number"
          for attempt in $(seq 1 30); do
            pr_json="$(gh pr view "$pr_number" \
              --repo "$GITHUB_REPOSITORY" \
              --json headRefOid,mergeStateStatus,mergeable)"
            head_sha="$(jq -r '.headRefOid' <<<"$pr_json")"
            merge_state="$(jq -r '.mergeStateStatus' <<<"$pr_json")"
            mergeable="$(jq -r '.mergeable' <<<"$pr_json")"
            check_runs_json="$(gh api "repos/$GITHUB_REPOSITORY/commits/$head_sha/check-runs?per_page=100")"
            status_json="$(gh api "repos/$GITHUB_REPOSITORY/commits/$head_sha/status")"
            pending_check_runs="$(jq '[.check_runs[]? | select(.status != "completed")] | length' <<<"$check_runs_json")"
            failing_check_runs="$(jq '[.check_runs[]? | select(.status == "completed" and (.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral"))] | length' <<<"$check_runs_json")"
            failing_statuses="$(jq '[.statuses[]? | select(.state != "success")] | length' <<<"$status_json")"
            quota_statuses="$(jq '[.statuses[]? | select(.state != "success" and (((.target_url // "") + " " + (.description // "") + " " + (.context // "")) | test("build-rate-limit|api-deployments-free-per-day|upgradeToPro|Deployment rate limited")))] | length' <<<"$status_json")"

            echo "Merge state attempt $attempt: $merge_state; pending checks=$pending_check_runs failing checks=$failing_check_runs failing statuses=$failing_statuses quota statuses=$quota_statuses"
            if [ "$merge_state" = "CLEAN" ] || [ "$merge_state" = "HAS_HOOKS" ]; then
              with_retry gh pr merge "$pr_number" --repo "$GITHUB_REPOSITORY" --merge
              exit 0
            fi

            if [ "$merge_state" = "UNSTABLE" ] &&
              [ "$mergeable" = "MERGEABLE" ] &&
              [ "$pending_check_runs" -eq 0 ] &&
              [ "$failing_check_runs" -eq 0 ] &&
              [ "$failing_statuses" -gt 0 ] &&
              [ "$failing_statuses" -eq "$quota_statuses" ]; then
              echo "Release PR #$pr_number is mergeable, but only Vercel quota status checks are failing."
              echo "Leaving the release PR open so production deploy can be retried after quota resets."
              exit 0
            fi

            if [ "$merge_state" = "DIRTY" ] || [ "$merge_state" = "BLOCKED" ]; then
              echo "Release PR #$pr_number is blocked: $merge_state"
              exit 1
            fi

            sleep 20
          done

          echo "Release PR #$pr_number did not become clean in time."
          exit 1

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const title = "Release PR merge workflow failed";
            const body = [
              "The automated release PR merge workflow failed.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Codex should inspect the run logs and fix the release merge automation or the blocked release PR."
            ].join("\n");
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: "automation",
                color: "1d76db",
                description: "Created by automation workflows",
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const alreadyOpen = existing.data.some((issue) => issue.title === title);
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["automation"],
              });
            }
