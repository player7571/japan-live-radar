name: Merge Release PR

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Merge clean release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head dev \
            --state open \
            --json number \
            --jq '.[0].number // ""')"

          if [ -z "$pr_number" ]; then
            echo "No open dev to main release PR."
            exit 0
          fi

          echo "Checking release PR #$pr_number"
          for attempt in $(seq 1 30); do
            merge_state="$(gh pr view "$pr_number" \
              --repo "$GITHUB_REPOSITORY" \
              --json mergeStateStatus \
              --jq '.mergeStateStatus')"

            echo "Merge state attempt $attempt: $merge_state"
            if [ "$merge_state" = "CLEAN" ] || [ "$merge_state" = "HAS_HOOKS" ]; then
              gh pr merge "$pr_number" --repo "$GITHUB_REPOSITORY" --merge
              exit 0
            fi

            if [ "$merge_state" = "DIRTY" ] || [ "$merge_state" = "BLOCKED" ]; then
              echo "Release PR #$pr_number is blocked: $merge_state"
              exit 1
            fi

            sleep 20
          done

          echo "Release PR #$pr_number did not become clean in time."
          exit 1
