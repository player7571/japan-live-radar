name: Merge Release PR

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  checks: read
  contents: write
  issues: write
  pull-requests: write
  statuses: read

jobs:
  merge-release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Merge clean release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          with_retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi
              echo "GitHub CLI command failed on attempt $attempt; retrying shortly."
              sleep $((attempt * 5))
            done
            "$@"
          }

          pr_number="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head dev \
            --state open \
            --json number \
            --jq '.[0].number // ""')"

          if [ -z "$pr_number" ]; then
            echo "No open dev to main release PR."
            exit 0
          fi

          echo "Checking release PR #$pr_number"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main dev
          if ! git merge-base --is-ancestor origin/main origin/dev; then
            echo "dev does not contain the latest main release commit. Reconciling dev with main before release merge."
            git switch -C dev origin/dev
            if ! git merge --no-edit origin/main; then
              echo "Could not automatically merge main into dev. Manual conflict resolution is required."
              exit 1
            fi
            with_retry git push origin HEAD:dev
            echo "Pushed dev reconciliation merge. Waiting for checks on the updated dev head."
          fi

          for attempt in $(seq 1 30); do
            head_sha="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/dev" --jq '.object.sha')"
            check_runs_json="$(gh api "repos/$GITHUB_REPOSITORY/commits/$head_sha/check-runs?per_page=100")"
            status_json="$(gh api "repos/$GITHUB_REPOSITORY/commits/$head_sha/status")"
            pending_check_runs="$(jq '[.check_runs[]? | select(.status != "completed")] | length' <<<"$check_runs_json")"
            failing_check_runs="$(jq '[.check_runs[]? | select(.status == "completed" and (.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral"))] | length' <<<"$check_runs_json")"
            failing_statuses="$(jq '[.statuses[]? | select(.state != "success")] | length' <<<"$status_json")"
            quota_statuses="$(jq '[.statuses[]? | select(.state != "success" and (((.target_url // "") + " " + (.description // "") + " " + (.context // "")) | test("build-rate-limit|api-deployments-free-per-day|upgradeToPro|Deployment rate limited")))] | length' <<<"$status_json")"

            echo "Release attempt $attempt for $head_sha: pending checks=$pending_check_runs failing checks=$failing_check_runs failing statuses=$failing_statuses quota statuses=$quota_statuses"
            if [ "$pending_check_runs" -eq 0 ] &&
              [ "$failing_check_runs" -eq 0 ] &&
              [ "$failing_statuses" -eq 0 ]; then
              with_retry gh pr merge "$pr_number" --repo "$GITHUB_REPOSITORY" --merge
              exit 0
            fi

            if [ "$pending_check_runs" -eq 0 ] &&
              [ "$failing_check_runs" -eq 0 ] &&
              [ "$failing_statuses" -gt 0 ] &&
              [ "$failing_statuses" -eq "$quota_statuses" ]; then
              echo "Release PR #$pr_number only has Vercel quota status checks failing."
              echo "Merging so the production retry workflow can deploy the latest main commit after quota resets."
              with_retry gh pr merge "$pr_number" --repo "$GITHUB_REPOSITORY" --merge
              exit 0
            fi

            if [ "$pending_check_runs" -eq 0 ] &&
              { [ "$failing_check_runs" -gt 0 ] || [ "$failing_statuses" -gt "$quota_statuses" ]; }; then
              echo "Release PR #$pr_number has non-quota check failures."
              exit 1
            fi

            sleep 20
          done

          echo "Release PR #$pr_number did not become clean in time."
          exit 1

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const title = "Release PR merge workflow failed";
            const body = [
              "The automated release PR merge workflow failed.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Codex should inspect the run logs and fix the release merge automation or the blocked release PR."
            ].join("\n");
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: "automation",
                color: "1d76db",
                description: "Created by automation workflows",
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const alreadyOpen = existing.data.some((issue) => issue.title === title);
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["automation"],
              });
            }
