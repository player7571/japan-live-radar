name: Auto Release PR

on:
  workflow_dispatch:
  push:
    branches:
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  open-release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open or update release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing_pr="$(gh pr list --base main --head dev --state open --json number --jq '.[0].number // ""')"
          if [ -n "$existing_pr" ]; then
            echo "Release PR #$existing_pr already exists."
            gh pr edit "$existing_pr" --body "Automated release from dev to main. CI, Vercel, migrations, and production health checks run through GitHub Actions."
            gh pr merge "$existing_pr" --auto --merge || echo "Auto-merge could not be enabled; PR remains ready for Codex to merge."
            exit 0
          fi

          pr_url="$(gh pr create \
            --base main \
            --head dev \
            --title "Release dev to production" \
            --body "Automated release from dev to main. CI, Vercel, migrations, and production health checks run through GitHub Actions.")"
          echo "$pr_url"
          gh pr merge "$pr_url" --auto --merge || echo "Auto-merge could not be enabled; PR remains ready for Codex to merge."
