name: Auto Release PR

on:
  workflow_dispatch:
  push:
    branches:
      - dev

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  open-release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Open or update release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          with_retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi
              echo "GitHub CLI command failed on attempt $attempt; retrying shortly."
              sleep $((attempt * 5))
            done
            "$@"
          }

          existing_pr="$(with_retry gh pr list --base main --head dev --state open --json number --jq '.[0].number // ""')"
          if [ -n "$existing_pr" ]; then
            echo "Release PR #$existing_pr already exists."
            with_retry gh pr edit "$existing_pr" --body "Release candidate from dev to main. This PR is checked by CI and merged by the Merge Release PR workflow during the 09:00/21:00 KST release windows, or manually when an immediate production release is desired."
            exit 0
          fi

          if git merge-base --is-ancestor origin/dev origin/main; then
            echo "No release PR needed because main already contains dev."
            exit 0
          fi

          if git diff --quiet origin/main...origin/dev -- .; then
            echo "No release PR needed because dev has no file changes compared with main."
            exit 0
          fi

          pr_url="$(with_retry gh pr create \
            --base main \
            --head dev \
            --title "Release dev to production" \
            --body "Release candidate from dev to main. This PR is checked by CI and merged by the Merge Release PR workflow during the 09:00/21:00 KST release windows, or manually when an immediate production release is desired.")"
          echo "$pr_url"

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const title = "Auto release PR workflow failed";
            const body = [
              "The automated dev-to-main release PR workflow failed.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Codex should inspect the run logs and fix the release PR automation."
            ].join("\n");
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: "automation",
                color: "1d76db",
                description: "Created by automation workflows",
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const alreadyOpen = existing.data.some((issue) => issue.title === title);
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["automation"],
              });
            }
