name: Auto Release PR

on:
  workflow_dispatch:
  push:
    branches:
      - dev

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  open-release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open or update release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing_pr="$(gh pr list --base main --head dev --state open --json number --jq '.[0].number // ""')"
          if [ -n "$existing_pr" ]; then
            echo "Release PR #$existing_pr already exists."
            gh pr edit "$existing_pr" --body "Automated release from dev to main. CI, Vercel, migrations, and production health checks run through GitHub Actions."
            exit 0
          fi

          pr_url="$(gh pr create \
            --base main \
            --head dev \
            --title "Release dev to production" \
            --body "Automated release from dev to main. CI, Vercel, migrations, and production health checks run through GitHub Actions.")"
          echo "$pr_url"

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Auto release PR workflow failed";
            const body = [
              "The automated dev-to-main release PR workflow failed.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Codex should inspect the run logs and fix the release PR automation."
            ].join("\n");
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: "automation",
                color: "1d76db",
                description: "Created by automation workflows",
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const alreadyOpen = existing.data.some((issue) => issue.title === title);
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["automation"],
              });
            }
