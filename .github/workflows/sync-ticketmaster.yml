name: Sync External Events

on:
  workflow_dispatch:
  schedule:
    # Tuesday and Friday 03:17 in Asia/Seoul while Actions minutes are constrained.
    - cron: "17 18 * * 1,4"

concurrency:
  group: sync-external-events
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync seed events
        run: npm run sync:seed
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Sync Ticketmaster events
        run: npm run sync:ticketmaster
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          TICKETMASTER_PAGE_LIMIT: ${{ vars.TICKETMASTER_PAGE_LIMIT || '2' }}
          TICKETMASTER_FETCH_TIMEOUT_MS: ${{ vars.TICKETMASTER_FETCH_TIMEOUT_MS || '12000' }}

      - name: Sync e+ events
        run: npm run sync:eplus
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EPLUS_SYNC_KEYWORDS: ${{ vars.EPLUS_SYNC_KEYWORDS || 'J-POP,K-POP,ライブ,コンサート,フェス,ROCK' }}
          EPLUS_ROW_LIMIT: ${{ vars.EPLUS_ROW_LIMIT || '80' }}
          EPLUS_FETCH_TIMEOUT_MS: ${{ vars.EPLUS_FETCH_TIMEOUT_MS || '12000' }}

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const title = "External event sync workflow failed";
            const body = [
              "The scheduled external event sync failed.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Codex should inspect API errors, e+ page mapping changes, data mapping changes, or missing secrets."
            ].join("\n");
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: "automation",
                color: "1d76db",
                description: "Created by automation workflows",
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const alreadyOpen = existing.data.some((issue) => issue.title === title);
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["automation"],
              });
            }
