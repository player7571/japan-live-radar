name: Deploy to Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check production deploy blockers
        id: production_blocker
        if: github.ref_name == 'main' && github.event_name == 'push'
        uses: actions/github-script@v9
        with:
          script: |
            const blockerTitles = new Set([
              "Production deploy blocked by Vercel daily quota",
              "Production health check failed",
            ]);
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "automation",
              per_page: 100,
            });
            const blockers = issues.filter((issue) => blockerTitles.has(issue.title));
            core.setOutput("skip_deploy", blockers.length > 0 ? "true" : "false");
            if (blockers.length > 0) {
              core.notice(`Skipping automatic production deploy while blockers are open: ${blockers.map((issue) => `#${issue.number}`).join(", ")}`);
            }

      - name: Skip blocked automatic production deploy
        if: github.ref_name == 'main' && github.event_name == 'push' && steps.production_blocker.outputs.skip_deploy == 'true'
        run: echo "Production deploy is deferred to Retry Production Deploy while automation blockers are open."

      - name: Sync Vercel runtime environment
        if: github.ref_name != 'main' || github.event_name != 'push' || steps.production_blocker.outputs.skip_deploy != 'true'
        run: |
          upsert_env() {
            local name="$1"
            local value="$2"
            local target="$3"

            if [ -z "$value" ]; then
              echo "::error::$name is required for $target deployments"
              exit 1
            fi

            if [ "$target" = "preview" ]; then
              npx vercel env add "$name" "$target" "" \
                --force \
                --yes \
                --value "$value" \
                --token="$VERCEL_TOKEN"
            else
              npx vercel env add "$name" "$target" \
                --force \
                --yes \
                --value "$value" \
                --token="$VERCEL_TOKEN"
            fi
          }

          for target in production preview; do
            upsert_env VITE_SUPABASE_URL "$VITE_SUPABASE_URL" "$target"
            upsert_env VITE_SUPABASE_ANON_KEY "$VITE_SUPABASE_ANON_KEY" "$target"
            upsert_env ADMIN_API_TOKEN "$ADMIN_API_TOKEN" "$target"
            upsert_env SUPABASE_SERVICE_ROLE_KEY "$SUPABASE_SERVICE_ROLE_KEY" "$target"
          done
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Pull Vercel environment
        if: github.ref_name != 'main' || github.event_name != 'push' || steps.production_blocker.outputs.skip_deploy != 'true'
        run: npx vercel pull --yes --environment=${{ github.ref_name == 'main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Vercel output
        if: github.ref_name != 'main' || github.event_name != 'push' || steps.production_blocker.outputs.skip_deploy != 'true'
        run: npx vercel build ${{ github.ref_name == 'main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy preview
        if: github.ref_name != 'main'
        run: |
          echo "Preview deploy is handled by the Vercel GitHub integration."
          echo "This workflow still syncs preview env and builds the prebuilt output for validation."

      - name: Deploy production
        if: github.ref_name == 'main' && (github.event_name != 'push' || steps.production_blocker.outputs.skip_deploy != 'true')
        run: >
          npx vercel deploy --prebuilt --prod
          --env VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          --env VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          --env ADMIN_API_TOKEN=${{ secrets.ADMIN_API_TOKEN }}
          --env SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Verify production
        if: github.ref_name == 'main' && (github.event_name != 'push' || steps.production_blocker.outputs.skip_deploy != 'true')
        run: |
          sleep 45
          npm run health:production
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://japan-live-radar.vercel.app' }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
