name: Production Health Check

on:
  workflow_dispatch:
  schedule:
    # 09:07 in Asia/Seoul while production deploy quota and Actions minutes are constrained.
    - cron: "7 0 * * *"

permissions:
  contents: read
  issues: write

jobs:
  health:
    runs-on: ubuntu-latest

    steps:
      - name: Check production health blockers
        id: blockers
        uses: actions/github-script@v9
        with:
          script: |
            const blockerTitles = new Set([
              "Production deploy blocked by Vercel daily quota",
              "Production health check failed",
            ]);
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "automation",
              per_page: 100,
            });
            const blockers = issues.filter((issue) => blockerTitles.has(issue.title));
            const skipHealth = context.eventName === "schedule" && blockers.length > 0;
            core.setOutput("skip_health", skipHealth ? "true" : "false");
            if (skipHealth) {
              core.notice(`Skipping scheduled health check while production blockers are open: ${blockers.map((issue) => `#${issue.number}`).join(", ")}`);
            } else {
              core.info("Production health check should run.");
            }

      - name: Skip blocked scheduled health check
        if: steps.blockers.outputs.skip_health == 'true'
        run: echo "Production health is deferred to Retry Production Deploy while automation blockers are open."

      - name: Check out repository
        if: steps.blockers.outputs.skip_health != 'true'
        uses: actions/checkout@v6

      - name: Set up Node
        if: steps.blockers.outputs.skip_health != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.blockers.outputs.skip_health != 'true'
        run: npm ci

      - name: Check production
        if: steps.blockers.outputs.skip_health != 'true'
        run: npm run health:production
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://japan-live-radar.vercel.app' }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const title = "Production health check failed";
            const body = [
              "The scheduled production health check failed.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Codex should inspect the run logs, check Vercel/Supabase status, and patch the app or automation."
            ].join("\n");
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: "automation",
                color: "1d76db",
                description: "Created by automation workflows",
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const alreadyOpen = existing.data.some((issue) => issue.title === title);
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["automation"],
              });
            }
