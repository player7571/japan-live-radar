name: Dispatch Due Alerts

on:
  workflow_dispatch:
  schedule:
    # 09:17 and 21:17 in Asia/Seoul while the app is pre-launch.
    - cron: "17 0,12 * * *"

concurrency:
  group: dispatch-due-alerts
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Check due alert queue
        id: due_alerts
        run: |
          set -euo pipefail

          if [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::ADMIN_API_TOKEN is required"
            exit 1
          fi

          base_url="${APP_BASE_URL%/}"
          response="$(curl --fail-with-body --silent --show-error \
            --connect-timeout "${ALERT_QUEUE_CONNECT_TIMEOUT_SECONDS:-10}" \
            --max-time "${ALERT_QUEUE_MAX_TIME_SECONDS:-30}" \
            --retry "${ALERT_QUEUE_RETRY_ATTEMPTS:-2}" \
            --retry-delay 2 \
            --retry-all-errors \
            --header "x-admin-token: $ADMIN_API_TOKEN" \
            "$base_url/api/admin-alerts")"

          QUEUE_RESPONSE="$response" python3 <<'PY'
          import json
          import os
          import sys

          payload = json.loads(os.environ["QUEUE_RESPONSE"])
          if payload.get("configured") is False:
              print("::error::Admin alert API is not configured")
              sys.exit(1)

          alerts = payload.get("alerts")
          if not isinstance(alerts, list):
              print("::error::Admin alert API did not return an alert list")
              sys.exit(1)

          should_dispatch = "true" if alerts else "false"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"should_dispatch={should_dispatch}\n")
              output.write(f"due_count={len(alerts)}\n")

          if alerts:
              print(f"{len(alerts)} due alert(s) require dispatch.")
          else:
              print("No due alerts; skipping Node setup.")
          PY
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://japan-live-radar.vercel.app' }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          ALERT_QUEUE_CONNECT_TIMEOUT_SECONDS: ${{ vars.ALERT_QUEUE_CONNECT_TIMEOUT_SECONDS || '10' }}
          ALERT_QUEUE_MAX_TIME_SECONDS: ${{ vars.ALERT_QUEUE_MAX_TIME_SECONDS || '30' }}
          ALERT_QUEUE_RETRY_ATTEMPTS: ${{ vars.ALERT_QUEUE_RETRY_ATTEMPTS || '2' }}

      - name: Check out repository
        if: steps.due_alerts.outputs.should_dispatch == 'true'
        uses: actions/checkout@v6

      - name: Set up Node
        if: steps.due_alerts.outputs.should_dispatch == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.due_alerts.outputs.should_dispatch == 'true'
        run: npm ci

      - name: Dispatch due alerts
        if: steps.due_alerts.outputs.should_dispatch == 'true'
        run: npm run alerts:dispatch
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://japan-live-radar.vercel.app' }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          ALERT_WEBHOOK_SECRET: ${{ secrets.ALERT_WEBHOOK_SECRET }}
          ALERT_WEBHOOK_ATTEMPTS: ${{ vars.ALERT_WEBHOOK_ATTEMPTS || '3' }}
          ALERT_WEBHOOK_TIMEOUT_MS: ${{ vars.ALERT_WEBHOOK_TIMEOUT_MS || '10000' }}

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const title = "Alert dispatch workflow failed";
            const body = [
              "The scheduled alert dispatcher failed.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Codex should inspect the run logs and fix the underlying delivery or configuration issue."
            ].join("\n");
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: "automation",
                color: "1d76db",
                description: "Created by automation workflows",
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const alreadyOpen = existing.data.some((issue) => issue.title === title);
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["automation"],
              });
            }
