name: Dispatch Due Alerts

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: dispatch-due-alerts
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dispatch due alerts
        run: npm run alerts:dispatch
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://japan-live-radar.vercel.app' }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          ALERT_WEBHOOK_SECRET: ${{ secrets.ALERT_WEBHOOK_SECRET }}
          ALERT_WEBHOOK_ATTEMPTS: ${{ vars.ALERT_WEBHOOK_ATTEMPTS || '3' }}
          ALERT_WEBHOOK_TIMEOUT_MS: ${{ vars.ALERT_WEBHOOK_TIMEOUT_MS || '10000' }}

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const title = "Alert dispatch workflow failed";
            const body = [
              "The scheduled alert dispatcher failed.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Codex should inspect the run logs and fix the underlying delivery or configuration issue."
            ].join("\n");
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: "automation",
                color: "1d76db",
                description: "Created by automation workflows",
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const alreadyOpen = existing.data.some((issue) => issue.title === title);
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["automation"],
              });
            }
